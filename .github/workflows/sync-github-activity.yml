name: Sync GitHub Activity

on:
  schedule:
    # Every 3 days at 8:00 UTC
    - cron: "0 8 */3 * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Sync GitHub activity
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx tsx scripts/sync-github-activity.ts

      - name: Sync heatmap data
        run: npx tsx scripts/sync-obsidian.ts

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/github-activity.json src/data/heatmap-data.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync GitHub activity & heatmap data

          Co-Authored-By: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
            git push
          fi
